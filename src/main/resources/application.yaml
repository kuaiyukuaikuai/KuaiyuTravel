server:
  port: 8080

spring:
  application:
    name: KuaiyuTravel

  # 激活默认的环境配置 (通常本地开发使用 local)
  profiles:
    active: local

  # Servlet 容器配置
  servlet:
    multipart:
      max-file-size: 10MB      # 单个文件最大限制
      max-request-size: 50MB   # 单次请求总大小限制

  # 数据源全局配置 (具体凭证由具体环境配置注入)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:3306/kuaiyu_travel?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:default_password}

  # Redis 全局配置
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: 6379
      password: ${REDIS_PASSWORD:default_password}
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s

  # Spring AI 全局配置 (使用占位符保证安全)
  ai:
    openai:
      base-url: https://api.siliconflow.cn
      api-key: ${AI_API_KEY:placeholder}
      chat:
        options:
          model: deepseek-ai/DeepSeek-V3
          temperature: 0.7
      low-level-model: deepseek-ai/DeepSeek-V3
      embedding:
        options:
          # 推荐使用智源的 bge-m3，支持多语言且检索精度极高
          model: BAAI/bge-m3
    vectorstore:
      milvus:
        client:
          host: 192.168.100.131
          port: 19530
        # 你的快鱼旅行知识库集合名称
        collection-name: kuaiyu_knowledge_v1
        # BAAI/bge-m3 的向量维度是 1024
        embedding-dimension: 1024
        # 设置索引类型和距离计算公式 (L2 欧氏距离)
        index-type: HNSW
        metric-type: L2
        initialize-schema: true
        index-parameters: '{"M":16,"efConstruction":256}'
    # 【新增】MCP 客户端全局配置
    # 【完全修复：M4 标准的多连接 MCP 配置】
    mcp:
      client:
        enabled: true
        sse:
          connections:
            # 这里是你给这个连接起的名字 (Spring AI 会用它作为前缀)
            amap-official-mcp:
              # 【关键修复】属性名改为了 url，而不是 management-url
              url: "https://mcp.amap.com?key=${AMAP_API_KEY:placeholder}"

              # 注意：既然你的高德 key 已经拼接在 URL 里了，
              # 这里就不需要再配置 headers 的 Authorization 了。

  # JSON 序列化配置
  jackson:
    default-property-inclusion: non_null # 忽略为 null 的字段

# MyBatis-Plus 全局配置
mybatis-plus:
  # 扫描 Java 实体类包（使用 * 通配符适配 modules 下的所有 entity 目录）
  type-aliases-package: com.kuaiyukuaikuai.kuaiyutravel.modules.*.entity

  global-config:
    db-config:
      table-prefix: tb_

  # 【新增这一行】告诉 MyBatis 去 resources/mapper 目录下及其所有子目录找 XML
  mapper-locations: classpath*:mapper/**/*.xml

# 阿里云 OSS 全局配置
aliyun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:placeholder}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:placeholder}
    bucket-name: kuaiyutravel

# 日志级别配置
logging:
  level:
    com.kuaiyukuaikuai: debug