server:
  port: 8080

spring:
  application:
    name: KuaiyuTravel

  # 激活默认的环境配置 (通常本地开发使用 local)
  profiles:
    active: local

  # Servlet 容器配置
  servlet:
    multipart:
      max-file-size: 10MB      # 单个文件最大限制
      max-request-size: 50MB   # 单次请求总大小限制

  # 数据源全局配置 (具体凭证由具体环境配置注入)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:3306/kuaiyu_travel?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:default_password}

  # Redis 全局配置
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: 6379
      password: ${REDIS_PASSWORD:default_password}
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s

  # Spring AI 全局配置 (使用占位符保证安全)
  ai:
    openai:
      base-url: https://api.siliconflow.cn
      api-key: ${AI_API_KEY:placeholder}
      chat:
        options:
          model: deepseek-ai/DeepSeek-V3
          temperature: 0.7
      low-level-model: deepseek-ai/DeepSeek-V3
      embedding:
        options:
          # 推荐使用智源的 bge-m3，支持多语言且检索精度极高
          model: BAAI/bge-m3
    vectorstore:
      milvus:
        client:
          host: 192.168.100.131
          port: 19530
        # 你的快鱼旅行知识库集合名称
        collection-name: kuaiyu_knowledge_v1
        # BAAI/bge-m3 的向量维度是 1024
        embedding-dimension: 1024
        # 设置索引类型和距离计算公式 (L2 欧氏距离)
        index-type: HNSW
        metric-type: L2
        initialize-schema: true
        index-parameters: '{"M":16,"efConstruction":256}'

# 【新增】自定义高德 MCP 全局配置占位符
amap:
  mcp:
    key: ${AMAP_API_KEY:placeholder}

  # RabbitMQ 全局配置
  rabbitmq:
    publisher-confirm-type: correlated
    publisher-returns: true

  # JSON 序列化配置
  jackson:
    default-property-inclusion: non_null # 忽略为 null 的字段

# MyBatis-Plus 全局配置
mybatis-plus:
  # 扫描 Java 实体类包（使用 * 通配符适配 modules 下的所有 entity 目录）
  type-aliases-package: com.kuaiyukuaikuai.kuaiyutravel.modules.*.entity

  global-config:
    db-config:
      table-prefix: tb_

  # 【新增这一行】告诉 MyBatis 去 resources/mapper 目录下及其所有子目录找 XML
  mapper-locations: classpath*:mapper/**/*.xml

# 阿里云 OSS 全局配置
aliyun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:placeholder}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:placeholder}
    bucket-name: kuaiyutravel

# 快鱼旅行 AI 提示词配置
kuaiyu:
  ai:
    system-prompt: |
      你是【快鱼旅行】的专属高级 AI 旅游顾问，热情、专业且语气自然。

      【身份与边界红线】：
      1. 请用专业的态度回答用户的旅游问题，严格使用'POI'、'景点'等术语。
      2. 绝对拒绝回答任何与旅游无关的政治、暴恐、色情、代码生成等问题。

      【数据溯源与播报规则】：
      1. 来源 A【参考上下文 Context】：必须使用话术"根据快鱼旅行用户的真实分享..."。
      2. 来源 B【searchPoiTool 工具】：必须使用话术"我为您查询了最新的全网实时数据..."。

      【优惠券主动推销与卡片渲染规则】(最高优先级！)：
      1. 当用户询问某个具体的景点或酒店时，你【必须主动】调用 `checkCouponsTool` 查询是否有优惠。
      2. 如果工具返回了类似 [COUPON_CARD|...] 格式的特定标记，你【绝对不能】擅自修改、翻译或拆解这个标记！
      3. 你必须在自然语言回复的【最后一行】，将该标记【原封不动】地输出。

      【组团与拼车社交引导规则】(核心社交闭环)：
      1. 当用户询问"有没有组团"、"想找人一起玩"、"求拼车"，或者表达了结伴出行的意愿时，你【必须主动】调用 `searchGroupsTool` 工具。
      2. 如果工具返回了类似 [GROUP_CARD|...] 格式的特定标记，你【绝对不能】擅自修改、翻译或拆解这个标记！必须在自然语言的最后原封不动地输出它。
      3. 如果工具告诉你没有找到相关组团，你必须用极具感染力的话术，鼓励用户自己当团长发起组团。

# 日志级别配置
logging:
  level:
    com.kuaiyukuaikuai: debug