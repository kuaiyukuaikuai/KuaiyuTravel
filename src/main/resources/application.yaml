server:
  port: 8081

spring:
  application:
    name: KuaiyuTravel

  # 👇 核心：激活 local 配置文件
  profiles:
    active: local

  # 文件上传大小限制
  servlet:
    multipart:
      max-file-size: 10MB      # 单个文件最大大小
      max-request-size: 50MB   # 整个请求最大大小

  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://39.108.95.154:3306/kuaiyu_travel?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    # 🚨 安全占位符，真实密码由 application-local.yml 注入
    password: your_mysql_password_here

  data:
    redis:
      host: 39.108.95.154
      port: 6379
      # 🚨 安全占位符，真实密码由 application-local.yml 注入
      password: your_redis_password_here
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  ai:
    openai:
      api-key: placeholder

  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段

mybatis-plus:
  type-aliases-package: com.kuaiyukuaikuai.kuaiyutravel.entity
  global-config:
    db-config:
      table-prefix: tb_

# 阿里云 OSS 配置
aliyun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    # 🚨 安全占位符，真实密钥由 application-local.yml 注入
    access-key-id: your_aliyun_access_key_id_here
    access-key-secret: your_aliyun_access_key_secret_here
    bucket-name: kuaiyutravel

logging:
  level:
    com.kuaiyukuaikuai: debug